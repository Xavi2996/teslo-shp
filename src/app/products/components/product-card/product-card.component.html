<div class="card bg-base-100 shadow-sm animate-fade-in">
  <figure>
    <img
      [src]="product()?.images ?? [] | productImage"
      [alt]="product()?.title"
    />
  </figure>
  <div class="card-body">
    <h2
      class="card-title font-montserrat text-accent text-xl cursor-pointer hover:underline hover:text-primary transition-colors duration-200"
      [routerLink]="['/product', product()?.slug]"
    >
      {{ product()?.title }}
    </h2>
    <p>
      {{ product()?.description | slice: 0 : 70 }}
    </p>
    <div class="card-actions justify-end">
      <a [routerLink]="['/product', product()?.slug]" class="btn btn-primary"
        >Ver detalles</a
      >
    </div>
  </div>
</div>
